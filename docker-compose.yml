services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: currency_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  migration:
    build:
      context: .
      dockerfile: src/MigrationService/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      CONNECTION_STRING: "Host=postgres;Port=5432;Database=currency_db;Username=postgres;Password=postgres"
    restart: on-failure

  currency_updater:
    build:
      context: .
      dockerfile: src/CurrencyUpdater/Dockerfile
    depends_on:
      migration:
        condition: service_completed_successfully
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=currency_db;Username=postgres;Password=postgres"
    restart: always

  user_service:
    build:
      context: .
      dockerfile: src/UserService/UserService.API/Dockerfile
    depends_on:
      migration:
        condition: service_completed_successfully
    ports:
      - "5001:8080"
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__ReadConnection: "Host=postgres;Port=5432;Database=currency_db;Username=postgres;Password=postgres"
      ConnectionStrings__WriteConnection: "Host=postgres;Port=5432;Database=currency_db;Username=postgres;Password=postgres"
      JwtSettings__SecretKey: "super-secret-key-at-least-32-characters-long!"
      JwtSettings__Issuer: "CurrencyTest"
      JwtSettings__Audience: "CurrencyTest"
    restart: always

  finance_service:
    build:
      context: .
      dockerfile: src/FinanceService/FinanceService.API/Dockerfile
    depends_on:
      migration:
        condition: service_completed_successfully
    ports:
      - "5002:8080"
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__ReadConnection: "Host=postgres;Port=5432;Database=currency_db;Username=postgres;Password=postgres"
      ConnectionStrings__WriteConnection: "Host=postgres;Port=5432;Database=currency_db;Username=postgres;Password=postgres"
      JwtSettings__SecretKey: "super-secret-key-at-least-32-characters-long!"
      JwtSettings__Issuer: "CurrencyTest"
      JwtSettings__Audience: "CurrencyTest"
    restart: always

  api_gateway:
    build:
      context: .
      dockerfile: src/ApiGateway/Dockerfile
    depends_on:
      - user_service
      - finance_service
    ports:
      - "5000:8080"
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      JwtSettings__SecretKey: "super-secret-key-at-least-32-characters-long!"
      JwtSettings__Issuer: "CurrencyTest"
      JwtSettings__Audience: "CurrencyTest"
    restart: always

volumes:
  postgres_data:
